<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="page2.css">
</head>
<body>

    <div class="page">
        <div class="card">
            <h1>Sign Up</h1>
            <p class="subtitle">Please fill in this form to create an account!</p>
            <hr>

            <form>
                <div class="row">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>

                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <input type="password" placeholder="Confirm Password" required>

                <label class="checkbox">
                    <input type="checkbox" required>
                    <span>I accept the <a href="#">Terms of Use</a> &amp; <a href="#">Privacy Policy</a>.</span>
                </label>

                <button type="submit">Sign Up</button>
            </form>
        </div>

        <p class="login-link">Already have an account? <a href="#">Login here</a>.</p>
    </div>


</body>
</html>
