<body>

  <div class="container">
    <div class="illustration">
      <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="10" width="160" height="105" rx="10" fill="#1a1a3d"/>

      <div class="forgot">Forgot <a href="#">Username / Password ?</a></div>
