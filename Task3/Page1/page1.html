<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="page1.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="sign-up">Sign Up</h2>
            <form action="">
                <div class="name">
                    <input type="text" class="firstname" placeholder="First Name">
                    <input type="text" class="lastname" placeholder="Last Name">
                </div>
                <input type="email" class="email" placeholder="Email">
                <input type="password" class="password" placeholder="Password">
                <input type="password" class="confirm-pass" placeholder="Confirm Password">

                <label class="check-box">
                    <input type="checkbox">
                    I accept the Terms of Use & Privacy Policy
                </label>
                <button class="submit">Sign Up</button>
            </form>
            <p class="login">Already have an account? <a href="#">Login here</a></p>
            <p class="copy-right">Copyright © YourCompany.com</p>
        </div>
    </div>
</body>
</html>
