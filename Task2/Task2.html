<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
    <link rel="stylesheet" href="Task2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="head">
            <h2>
                Linked<i class="fa-brands fa-linkedin"></i>
            </h2>
        </div>
    </header>

    <div class="container-linkedin">
        <h2>Sign in</h2>
        <p class="subtitle">stay updated on your professional world</p>
        <input class="email" type="text" placeholder="Email or Phone">
        <div class="password-box">
            <input type="password" placeholder="Password">
            <span class="show">Show</span>
        </div>
        <a class="forget" href="">Forgot Password?</a>
        <button class="sign-in">Sign in</button>
        <div class="or">
            <hr>
            <span>or</span>
            <hr>
        </div>
        <button class="apple"><i class="fa-brands fa-apple"></i>Sign in with Apple</button>
    </div>

    <p class="join">New to Linkedin? <a href="">Join now</a></p>
    <footer>
        <div class="foot">
            <a href="#">Linked<i class="fa-brands fa-linkedin"></i></a>
            <a href="#">© 2021</a>
            <a href="#">User Agreement</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Community Guidelines</a>
            <a href="#">Cookie Policy</a>
            <a href="#">Copyright Policy</a>
            <a href="#">Send Feedback</a>
            <a href="#">Language</a>
        </div>
    </footer>
</body>
</html>
